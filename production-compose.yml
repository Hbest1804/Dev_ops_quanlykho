services:
  backend:
    image: ghcr.io/hbest1804/quanlykho-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: quanlykho-api
    restart: unless-stopped
    networks:
      - quanlykho-network
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET}

  frontend: # Thụt đầu dòng ngang hàng với backend
    image: ghcr.io/hbest1804/quanlykho-frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: quanlykho-web
    restart: unless-stopped
    networks:
      - quanlykho-network
    environment:
      NODE_ENV: production
      FRONTEND_PORT: ${FRONTEND_PORT:-80}

  nginx: # Thụt đầu dòng ngang hàng với backend
    image: nginx:alpine
    container_name: quanlykho-proxy
    restart: unless-stopped
    networks:
      - quanlykho-network
    ports:
      - "${NGINX_PORT:-80}:80" # Dùng biến để linh hoạt port host
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-backend}
      FRONTEND_HOST: ${FRONTEND_HOST:-frontend} # Đã sửa mặc định về frontend
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      FRONTEND_PORT: ${FRONTEND_PORT:-80}
      NGINX_PORT: ${NGINX_PORT:-80}
      API_DOMAIN: ${API_DOMAIN:-localhost}
      WEB_DOMAIN: ${WEB_DOMAIN:-localhost}
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro

networks:
  quanlykho-network:
    driver: bridge