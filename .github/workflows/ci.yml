name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/quanlykho-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/quanlykho-frontend

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Backend CI
  # ────────────────────────────────────────────
  backend-ci:
    name: 🔧 Backend – Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🧪 Run Unit Tests
        run: npm test

      - name: 🏗️ Build (optional)
        run: npm run build || echo "No build step"

  # ────────────────────────────────────────────
  # JOB 2: Frontend CI
  # ────────────────────────────────────────────
  frontend-ci:
    name: 🎨 Frontend – Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🧪 Run Unit Tests
        run: npm test

      - name: 🏗️ Build production
        run: npm run build

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ────────────────────────────────────────────
  # JOB 3: Integration Test
  # ────────────────────────────────────────────
  integration-test:
    name: 🧪 Integration Test (PostgreSQL)
    runs-on: ubuntu-latest
    needs: backend-ci

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: quanlykho
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      NODE_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: quanlykho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: 🗄️ Apply DB schema
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d quanlykho \
            -f ../wareflow_schema.sql

      - name: 🚀 Start server & test health
        run: |
          node src/app.js &
          sleep 5
          curl --fail http://localhost:3000/api/health

  # ────────────────────────────────────────────
  # JOB 4: Docker Build & Push
  # ────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, integration-test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest

      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest

  # ────────────────────────────────────────────
  # JOB 5: Summary
  # ────────────────────────────────────────────
  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, integration-test]
    if: always()

    steps:
      - name: Print summary
        run: |
          echo "Backend: ${{ needs.backend-ci.result }}"
          echo "Frontend: ${{ needs.frontend-ci.result }}"
          echo "Integration: ${{ needs.integration-test.result }}"
