name: CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository_owner }}/quanlykho-backend
  IMAGE_FRONTEND: ${{ github.repository_owner }}/quanlykho-frontend

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Lint & Build – Backend
  # ────────────────────────────────────────────
  backend-ci:
    name: 🔧 Backend – Lint & Install
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: ✅ Verify app entry point exists
        run: test -f src/app.js && echo "app.js found ✓"

  # ────────────────────────────────────────────
  # JOB 2: Lint & Build – Frontend
  # ────────────────────────────────────────────
  frontend-ci:
    name: 🎨 Frontend – Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────
  # JOB 3: Integration Test with PostgreSQL
  # ────────────────────────────────────────────
  integration-test:
    name: 🧪 Integration Test (Backend + PostgreSQL)
    runs-on: ubuntu-latest
    needs: [backend-ci]

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: quanlykho
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quanlykho"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      NODE_ENV: test
      PORT: 3000
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: quanlykho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🗄️ Apply database schema
        run: |
          PGPASSWORD=postgres psql \
            -h localhost \
            -U postgres \
            -d quanlykho \
            -f ../wareflow_schema.sql

      - name: 🚀 Smoke-test: start server then ping health
        run: |
          node src/app.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://localhost:3000/ \
            || (kill $SERVER_PID && exit 1)
          kill $SERVER_PID

  # ────────────────────────────────────────────
  # JOB 4: Docker Build & Push (chỉ chạy trên main/develop)
  # ────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, integration-test]

    # Chỉ push image khi push lên branch chính, không phải PR
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🏷️ Extract Docker metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────
  # JOB 5: Summary
  # ────────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, integration-test]
    if: always()

    steps:
      - name: 📋 Print CI result summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend CI   | ${{ needs.backend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend CI  | ${{ needs.frontend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration  | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
