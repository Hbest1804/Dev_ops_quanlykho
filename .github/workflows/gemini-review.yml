name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📥 Get diff
        run: |
          git fetch origin main
          git diff origin/main | head -n 300 > diff.txt

      - name: 🤖 Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Create request JSON safely
          python3 - <<'EOF'
          import json, pathlib

          diff = pathlib.Path("diff.txt").read_text(encoding="utf-8", errors="replace")

          prompt = f"""
          You are a senior software engineer.

          Review this code diff and:
          - Find bugs
          - Suggest improvements
          - Check security issues

          Code diff:
          {diff}
          """

          body = {
              "contents": [
                  {"parts": [{"text": prompt}]}
              ]
          }

          pathlib.Path("body.json").write_text(json.dumps(body), encoding="utf-8")
          EOF

          # Call Gemini (FIXED: use gemini-pro + v1)
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "$RESPONSE" | python3 - <<'EOF'
          import json, sys

          try:
              data = json.load(sys.stdin)
              text = data['candidates'][0]['content']['parts'][0]['text']
          except Exception:
              text = json.dumps(data, indent=2)

          open("result.txt", "w", encoding="utf-8").write(text)
          EOF

      - name: 💬 Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('result.txt', 'utf8').trim();

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Gemini Code Review**\n\n${result}`
            });
