name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    # Required to post comments on pull requests
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Build JSON body safely via Python to avoid "Argument list too long"
          python3 - <<'EOF'
          import json, pathlib

          diff = pathlib.Path("diff.txt").read_text(encoding="utf-8", errors="replace")
          prompt = f"Review this code diff and suggest fixes:\n\n{diff}"
          body = {
              "contents": [
                  {"parts": [{"text": prompt}]}
              ]
          }
          pathlib.Path("body.json").write_text(json.dumps(body), encoding="utf-8")
          EOF

          # v1beta is required for gemini-1.5-flash (not available in v1)
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @body.json)

          # Extract the review text from the JSON response
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          try:
              text = data['candidates'][0]['content']['parts'][0]['text']
          except (KeyError, IndexError):
              text = json.dumps(data, indent=2)  # fallback: dump full response
          print(text)
          " > result.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('result.txt', 'utf8').trim();

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Gemini Code Review**\n\n${result}`
            });
