name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get diff
        run: |
          git fetch origin main
          git diff origin/main > diff.txt

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import json, pathlib

          diff = pathlib.Path("diff.txt").read_text(encoding="utf-8", errors="replace")
          prompt = f"Review this code diff and suggest fixes:\n\n{diff}"
          body = {
              "contents": [
                  {"parts": [{"text": prompt}]}
              ]
          }
          pathlib.Path("body.json").write_text(json.dumps(body), encoding="utf-8")
          EOF

          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @body.json > result.txt

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('result.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 Gemini Review:\n\n" + result
            });
