name: Gemini Slash Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: contains(github.event.comment.body, '/gemini review')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📥 Get diff
        run: |
          git fetch origin main
          git diff origin/main | head -n 300 > diff.txt

      - name: 🤖 Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import json, pathlib

          diff = pathlib.Path("diff.txt").read_text(encoding="utf-8", errors="replace")

          prompt = f"""
          Review this code diff:
          {diff}
          """

          body = {
              "contents": [
                  {"parts": [{"text": prompt}]}
              ]
          }

          pathlib.Path("body.json").write_text(json.dumps(body), encoding="utf-8")
          EOF

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @body.json)

          echo "$RESPONSE" | python3 - <<'EOF'
          import json, sys

          raw = sys.stdin.read()

          try:
              data = json.loads(raw)
              text = data['candidates'][0]['content']['parts'][0]['text']
          except:
              text = "❌ Gemini error:\n" + raw

          open("result.txt", "w", encoding="utf-8").write(text)
          EOF

      - name: 💬 Comment PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('result.txt', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 Gemini Review:\n\n" + result
            });
