name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  call-ci-logic:
    name: Call CI Pipeline
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      packages: write

  deploy:
    name: Deploy to Production
    needs: call-ci-logic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Gom file cần thiết vào thư mục để SCP đồng bộ chuẩn
      - name: Prepare files for SCP
        run: |
          mkdir -p deploy_temp
          cp production-compose.yml deploy_temp/
          cp default.conf.template deploy_temp/

      - name: Copy files to VPS
        uses: garygrossgarten/github-action-scp@release
        with:
          local: deploy_temp
          remote: /home/${{ secrets.VPS_USERNAME }}/quanlykho
          host: ${{ secrets.VPS_PUBLIC_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          privateKey: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_PUBLIC_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/${{ secrets.VPS_USERNAME }}/quanlykho
            cd /home/${{ secrets.VPS_USERNAME }}/quanlykho
            
            # Setup .env file (Giữ nguyên logic của bạn)
            cat <<EOF > .env
            POSTGRES_HOST="${{ secrets.POSTGRES_HOST }}"
            POSTGRES_PORT="${{ secrets.POSTGRES_PORT }}"
            POSTGRES_DB="${{ secrets.POSTGRES_DB }}"
            POSTGRES_USER="${{ secrets.POSTGRES_USER }}"
            POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            ADMIN_EMAIL="${{ vars.ADMIN_EMAIL }}"
            ADMIN_PASSWORD="${{ vars.ADMIN_PASSWORD }}"
            ADMIN_NAME="${{ vars.ADMIN_NAME }}"
            CORS_ORIGIN="${{ vars.CORS_ORIGIN }}"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            BACKEND_PORT="${{ vars.BACKEND_PORT }}"
            FRONTEND_PORT="${{ vars.FRONTEND_PORT }}"
            BACKEND_IMAGE_TAG="${{ github.sha }}"
            FRONTEND_IMAGE_TAG="${{ github.sha }}" 
            NGINX_PORT="${{ vars.NGINX_PORT }}"
            BACKEND_HOST="${{ vars.BACKEND_HOST }}"
            FRONTEND_HOST="${{ vars.FRONTEND_HOST }}"
            API_DOMAIN="${{ vars.API_DOMAIN }}"
            WEB_DOMAIN="${{ vars.WEB_DOMAIN }}"
            EOF

            # Pull latest images
            docker pull ghcr.io/hbest1804/quanlykho-backend:${{ github.sha }}
            docker pull ghcr.io/hbest1804/quanlykho-frontend:${{ github.sha }}

            # Run production compose
            docker-compose -f production-compose.yml up -d --remove-orphans
            # Clean up old images
            docker image prune -af